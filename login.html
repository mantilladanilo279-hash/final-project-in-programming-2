<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link rel="stylesheet" href="css/style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

</head>
<body class="auth-page login-page">

<!-- LOGO -->
<div class="logo-container">
  <img src="logo.png" alt="Library Logo" class="logo">
</div>

<!-- LOGIN CONTAINER -->
<div class="auth-container">

  <div class="auth-card">

    <h1>Library Login</h1>
    <p class="auth-subtitle">Welcome back. Your next good read is waiting.</p>

    <div class="book-line">
      <span></span>
      <i class="fa-solid fa-book-open"></i>
      <span></span>
    </div>

    <!-- USERNAME -->
    <div class="input-box">
      <i class="fa-solid fa-user"></i>

      <!-- KEEPING YOUR ORIGINAL ID -->
      <input
        type="text"
        id="loginUsername"
        placeholder="Username"
      >
    </div>

    <!-- PASSWORD -->
    <div class="input-box">
      <i class="fa-solid fa-lock"></i>

      <!-- KEEPING YOUR ORIGINAL ID -->
      <input
        type="password"
        id="loginPassword"
        placeholder="Password"
      >
    </div>

    <!-- KEEPING YOUR ORIGINAL FUNCTION -->
    <button onclick="login()">Login</button>

    <p class="auth-switch">
      Don't have an account?
      <a href="register.html">Register</a>
    </p>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-line"></div>

  <h3>BUILDING A BETTER FUTURE</h3>

  <p>One Southern, One Goal, One Future</p>
</div>

<script src="js/flash.js"></script>
<script src="js/login.js"></script>

</body>
</html>
